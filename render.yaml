services:
  - type: web
    name: lms-api
    runtime: node
    autoDeployTrigger: commit
    buildCommand: npm ci && npm --workspace backend run build
    startCommand: npm --workspace backend run start
    healthCheckPath: /api/health
    buildFilter:
      paths:
        - backend/**
        - package.json
        - package-lock.json
        - render.yaml
    envVars:
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        sync: false
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_DATABASE
        sync: false
      - key: MYSQL_SSL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES
        sync: false
      - key: JWT_REFRESH_EXPIRES
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: lms-frontend
    runtime: node
    autoDeployTrigger: commit
    buildCommand: npm ci && npm --workspace frontend run build
    startCommand: npm --workspace frontend run start -- --hostname 0.0.0.0
    healthCheckPath: /
    buildFilter:
      paths:
        - frontend/**
        - package.json
        - package-lock.json
        - render.yaml
    envVars:
      - key: INTERNAL_API_ORIGIN
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_YOUTUBE_NOCOOKIE
        value: "true"
