services:
  - type: web
    name: lms-api
    runtime: node
    plan: free
    autoDeployTrigger: commit
    buildCommand: npm ci && npm --workspace backend run build
    startCommand: npm --workspace backend run start
    healthCheckPath: /api/health
    buildFilter:
      paths:
        - backend/**
        - package.json
        - package-lock.json
        - render.yaml
    envVars:
      - key: APP_ORIGIN
        fromService:
          type: web
          name: lms-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        sync: false
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_DATABASE
        sync: false
      - key: MYSQL_SSL
        value: "true"
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 30d
      - key: HF_TOKEN
        sync: false
      - key: HUGGING_FACE_MODEL
        value: Qwen/Qwen2.5-7B-Instruct

  - type: web
    name: lms-frontend
    runtime: node
    plan: free
    autoDeployTrigger: commit
    buildCommand: npm ci && npm --workspace frontend run build
    startCommand: npm --workspace frontend run start -- --hostname 0.0.0.0
    healthCheckPath: /
    buildFilter:
      paths:
        - frontend/**
        - package.json
        - package-lock.json
        - render.yaml
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: lms-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: INTERNAL_API_ORIGIN
        fromService:
          type: web
          name: lms-api
          property: hostport
      - key: NEXT_PUBLIC_YOUTUBE_NOCOOKIE
        value: "true"
